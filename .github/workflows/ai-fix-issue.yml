name: AI Issue Fixer

on:
  issues:
    types: [opened, labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to fix"
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  ai-fix:
    runs-on: ubuntu-latest
    # Only run on 'ai-fix' label or manual trigger
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'ai-fix'))

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Get issue details
        id: issue
        uses: actions/github-script@v7
        with:
          script: |
            const number = context.payload.inputs?.issue_number || context.payload.issue?.number;
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(number),
            });

            // Also fetch comments for additional context
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(number),
              per_page: 10,
            });

            const commentText = comments
              .map(c => `**${c.user.login}:** ${c.body}`)
              .join('\n\n');

            const fullBody = issue.body + (commentText ? `\n\n---\n**Comments:**\n${commentText}` : '');

            core.exportVariable('ISSUE_TITLE', issue.title);
            core.exportVariable('ISSUE_BODY', fullBody);
            core.exportVariable('ISSUE_NUMBER', String(number));
            return number;

      - name: Run AI agent
        id: ai
        env:
          MODE: issue
          AI_PROVIDER: ${{ vars.AI_PROVIDER || 'anthropic' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node .github/scripts/ai-agent.js

      - name: Build to verify changes
        if: steps.ai.outputs.has_changes == 'true'
        run: |
          npm ci
          npm run build

      - name: Create Pull Request
        if: steps.ai.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ai/fix-issue-${{ env.ISSUE_NUMBER }}
          delete-branch: true
          title: "fix: AI-generated fix for #${{ env.ISSUE_NUMBER }}"
          body: |
            ## 🤖 AI-Generated Fix

            This PR was automatically generated by the AI Issue Fixer workflow.

            **Fixes #${{ env.ISSUE_NUMBER }}**

            ### Issue
            **${{ env.ISSUE_TITLE }}**

            ---

            > ⚠️ **This is an AI-generated fix.** Please review carefully before merging.
            > The build was verified to succeed with these changes.
          commit-message: "fix: AI-generated fix for #${{ env.ISSUE_NUMBER }}"
          labels: |
            ai-generated
            needs-review

      - name: Comment on issue
        if: steps.ai.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const number = Number(process.env.ISSUE_NUMBER);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
              body: `🤖 **AI Fix Bot**: I've analyzed this issue and created a pull request with a proposed fix. Please review it when you get a chance!\n\nThe fix was auto-generated — human review is recommended before merging.`
            });

      - name: Comment if no fix possible
        if: steps.ai.outputs.has_changes == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const number = Number(process.env.ISSUE_NUMBER);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
              body: `🤖 **AI Fix Bot**: I analyzed this issue but couldn't determine an automated code fix. This may require manual investigation or is a question/discussion rather than a bug.`
            });
