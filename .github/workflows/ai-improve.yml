name: AI Code Improvement

on:
  schedule:
    # Run every Monday at 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  ai-improve:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check for existing AI improvement PRs
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:ai/improve-`,
            });

            // Also check for PRs with the ai-improvement label
            const { data: labeledPrs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });

            const aiPrs = labeledPrs.filter(pr =>
              pr.labels.some(l => l.name === 'ai-improvement')
            );

            const hasOpen = prs.length > 0 || aiPrs.length > 0;
            core.setOutput('has_open_pr', hasOpen ? 'true' : 'false');

            if (hasOpen) {
              console.log(`Found ${prs.length + aiPrs.length} open AI improvement PR(s) — skipping`);
            }

      - name: Run AI improvement agent
        if: steps.check.outputs.has_open_pr == 'false'
        id: ai
        env:
          MODE: improve
          AI_PROVIDER: ${{ vars.AI_PROVIDER || 'anthropic' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node .github/scripts/ai-agent.js

      - name: Build to verify changes
        if: steps.check.outputs.has_open_pr == 'false' && steps.ai.outputs.has_changes == 'true'
        run: |
          npm ci
          npm run build

      - name: Create Pull Request
        if: steps.check.outputs.has_open_pr == 'false' && steps.ai.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ai/improve-${{ github.run_number }}
          delete-branch: true
          title: "improve: ${{ steps.ai.outputs.title }}"
          body: |
            ## 🤖 AI-Suggested Improvement

            **${{ steps.ai.outputs.title }}**

            ${{ steps.ai.outputs.description }}

            ---

            > This PR was automatically generated by the weekly AI Code Improvement workflow.
            > The build was verified to succeed with these changes.
            > ⚠️ Please review carefully before merging.
          commit-message: "improve: ${{ steps.ai.outputs.title }}"
          labels: |
            ai-improvement
            ai-generated
            needs-review
